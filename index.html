<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOOD DRUM</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --text: #f0ede8;
    --accent: #ff6b9d;
  }

  body.light-mode {
    --bg: #f5f3f0;
    --surface: #ffffff;
    --text: #2a2a2a;
    --accent: #ff6b9d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    transition: background 0.3s, color 0.3s;
  }

  /* Header with theme toggle */
  .header {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 100;
  }

  .theme-toggle {
    background: none;
    border: 1.5px solid var(--text);
    color: var(--text);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }

  .theme-toggle:hover {
    transform: scale(1.1);
    box-shadow: 0 0 12px var(--accent);
  }

  /* Animated background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(2.5rem, 10vw, 5rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1;
    margin-bottom: 6px;
    color: var(--accent);
  }

  .subtitle {
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    color: var(--text);
    opacity: 0.6;
    text-align: center;
    margin-bottom: 40px;
    text-transform: uppercase;
  }

  .bpm-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--text);
    opacity: 0.7;
  }

  .bpm-row span { 
    color: var(--text);
    font-weight: 700;
    opacity: 1;
  }

  .bpm-btn {
    background: none;
    border: 1px solid var(--text);
    color: var(--text);
    opacity: 0.6;
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .bpm-btn:hover { 
    opacity: 1;
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Sequencer grid */
  .sequencer {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 32px;
  }

  .track {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .track-label {
    width: 52px;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--text);
    opacity: 0.5;
    text-align: right;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .steps {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .step {
    width: clamp(28px, 5vw, 42px);
    height: clamp(28px, 5vw, 42px);
    border-radius: 8px;
    background: var(--surface);
    border: 2px solid var(--text);
    opacity: 0.3;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s, opacity 0.08s;
    position: relative;
    overflow: hidden;
  }

  .step::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .step:hover { 
    opacity: 0.5;
    transform: scale(1.05);
  }

  .step.active {
    opacity: 1;
    border-color: transparent;
  }

  .step.active::after { opacity: 1; }

  /* Per-track colors - no gradient, solid colors */
  .track[data-track="0"] .step.active { background: #ff3366; box-shadow: 0 0 12px #ff336688; }
  .track[data-track="1"] .step.active { background: #ff8c00; box-shadow: 0 0 12px #ff8c0088; }
  .track[data-track="2"] .step.active { background: #00e5ff; box-shadow: 0 0 12px #00e5ff88; }
  .track[data-track="3"] .step.active { background: #7fff00; box-shadow: 0 0 12px #7fff0088; }
  .track[data-track="4"] .step.active { background: #da70d6; box-shadow: 0 0 12px #da70d688; }
  .track[data-track="5"] .step.active { background: #ffd700; box-shadow: 0 0 12px #ffd70088; }

  /* Light mode adjustments */
  body.light-mode .track[data-track="0"] .step.active { box-shadow: 0 0 12px #ff336644; }
  body.light-mode .track[data-track="1"] .step.active { box-shadow: 0 0 12px #ff8c0044; }
  body.light-mode .track[data-track="2"] .step.active { box-shadow: 0 0 12px #00e5ff44; }
  body.light-mode .track[data-track="3"] .step.active { box-shadow: 0 0 12px #7fff0044; }
  body.light-mode .track[data-track="4"] .step.active { box-shadow: 0 0 12px #da70d644; }
  body.light-mode .track[data-track="5"] .step.active { box-shadow: 0 0 12px #ffd70044; }

  /* Playhead highlight */
  .step.playing {
    transform: scale(1.1);
    filter: brightness(1.4);
    border-color: var(--text) !important;
  }

  .step.playing.active {
    animation: pulse-hit 0.15s ease-out;
  }

  @keyframes pulse-hit {
    0% { transform: scale(1.25); }
    100% { transform: scale(1.1); }
  }

  /* Divider every 4 steps */
  .step:nth-child(4n) { margin-right: 6px; }

  /* Controls - reorganized layout */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-top: 40px;
    width: 100%;
    flex-wrap: wrap;
  }

  .controls-left,
  .controls-center,
  .controls-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .controls-center {
    order: 2;
  }

  .controls-left {
    order: 1;
  }

  .controls-right {
    order: 3;
  }

  @media (max-width: 768px) {
    .controls {
      gap: 12px;
    }
    .controls-left,
    .controls-center,
    .controls-right {
      gap: 8px;
    }
  }

  .play-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 32px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .play-btn:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
  }
  .play-btn:active { transform: translateY(0); }
  .play-btn.running { background: #ff3366; }

  .play-icon {
    font-size: 1.2rem;
  }

  .clear-btn {
    background: none;
    border: 2px solid var(--text);
    color: var(--text);
    padding: 10px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .clear-btn:hover { 
    opacity: 1;
    border-color: var(--accent);
    color: var(--accent);
  }

  .random-btn {
    background: none;
    border: 2px solid var(--text);
    color: var(--text);
    padding: 10px 18px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .random-btn:hover { 
    opacity: 1;
    border-color: #ffd700;
    color: #ffd700;
  }

  /* Flash overlay */
  .flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.05s;
  }

  /* Step counter */
  .step-dots {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }
  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text);
    opacity: 0.2;
    transition: background 0.05s, opacity 0.05s;
  }
  .dot.active { 
    background: var(--accent);
    opacity: 1;
  }

  /* Responsive container */
  .container {
    width: 100%;
    max-width: 900px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  @media (max-width: 768px) {
    .header {
      top: 12px;
      right: 12px;
    }

    .theme-toggle {
      width: 32px;
      height: 32px;
      font-size: 0.9rem;
      border: 1px solid var(--text);
    }

    h1 {
      font-size: clamp(2rem, 8vw, 4rem);
      margin-bottom: 12px;
    }
    
    .subtitle {
      font-size: 0.55rem;
      margin-bottom: 24px;
    }

    .sequencer {
      gap: 16px;
    }

    .track {
      gap: 12px;
    }

    .step {
      width: clamp(24px, 4.5vw, 38px);
      height: clamp(24px, 4.5vw, 38px);
    }

    .steps {
      gap: 8px;
    }

    .play-btn {
      padding: 10px 24px;
      font-size: 1rem;
    }

    .clear-btn,
    .random-btn {
      padding: 8px 14px;
      font-size: 0.6rem;
    }
  }
</style>
</head>
<body>

<div class="header">
  <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">🌙</button>
</div>

<div class="container">
  <h1>MOOD DRUM</h1>
  <p class="subtitle">tap to toggle &nbsp;&bull;&nbsp; hit play &nbsp;&bull;&nbsp; make noise</p>

  <div class="bpm-row">
    BPM
    <button class="bpm-btn" id="bpmDown">-</button>
    <span id="bpmVal">120</span>
    <button class="bpm-btn" id="bpmUp">+</button>
  </div>

  <div class="step-dots" id="stepDots"></div>

  <div class="sequencer" id="sequencer"></div>

  <div class="controls">
    <div class="controls-left">
      <button class="clear-btn" id="clearBtn">CLEAR</button>
    </div>
    <div class="controls-center">
      <button class="play-btn" id="playBtn">
        <span class="play-icon">▶</span>
        PLAY
      </button>
    </div>
    <div class="controls-right">
      <button class="random-btn" id="randomBtn">RANDOM</button>
    </div>
  </div>
</div>

<div class="flash" id="flash"></div>

<script>
const TRACKS = [
  { label: 'KICK',  freq: 60,  type: 'kick'   },
  { label: 'SNARE', freq: 180, type: 'snare'  },
  { label: 'HI-HAT',freq: 800, type: 'hihat'  },
  { label: 'CLAP',  freq: 200, type: 'clap'   },
  { label: 'TOM',   freq: 100, type: 'tom'    },
  { label: 'PERC',  freq: 400, type: 'perc'   },
];
const STEPS = 16;
const FLASH_COLORS = ['#ff3366','#ff8c00','#00e5ff','#7fff00','#da70d6','#ffd700'];

let bpm = 120;
let playing = false;
let currentStep = 0;
let intervalId = null;
let grid = TRACKS.map(() => Array(STEPS).fill(false));

const ctx = new (window.AudioContext || window.webkitAudioContext)();

// --- Sound engine ---
function playSound(type, freq) {
  const now = ctx.currentTime;
  switch(type) {
    case 'kick': {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.4);
      gain.gain.setValueAtTime(1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    }
    case 'snare': {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const src = ctx.createBufferSource();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass'; filter.frequency.value = 1500;
      src.buffer = buf;
      src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.7, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      src.start(now); src.stop(now + 0.2);
      break;
    }
    case 'hihat': {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const src = ctx.createBufferSource();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass'; filter.frequency.value = 7000;
      src.buffer = buf;
      src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      src.start(now);
      break;
    }
    case 'clap': {
      for (let i = 0; i < 3; i++) {
        const t = now + i * 0.01;
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1);
        const src = ctx.createBufferSource();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = 1200;
        src.buffer = buf;
        src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.5, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        src.start(t);
      }
      break;
    }
    case 'tom': {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.25);
      gain.gain.setValueAtTime(0.8, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
      break;
    }
    case 'perc': {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.12);
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.start(now); osc.stop(now + 0.12);
      break;
    }
  }
}

// --- Build UI ---
const sequencer = document.getElementById('sequencer');
const dotsContainer = document.getElementById('stepDots');

for (let s = 0; s < STEPS; s++) {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.id = `dot-${s}`;
  dotsContainer.appendChild(dot);
}

TRACKS.forEach((track, t) => {
  const row = document.createElement('div');
  row.className = 'track';
  row.dataset.track = t;

  const label = document.createElement('div');
  label.className = 'track-label';
  label.textContent = track.label;
  row.appendChild(label);

  const steps = document.createElement('div');
  steps.className = 'steps';

  for (let s = 0; s < STEPS; s++) {
    const step = document.createElement('div');
    step.className = 'step';
    step.dataset.track = t;
    step.dataset.step = s;
    step.addEventListener('click', () => {
      grid[t][s] = !grid[t][s];
      step.classList.toggle('active', grid[t][s]);
      if (grid[t][s]) {
        ctx.resume();
        playSound(track.type, track.freq);
      }
    });
    steps.appendChild(step);
  }

  row.appendChild(steps);
  sequencer.appendChild(row);
});

// --- Sequencer ---
function tick() {
  // Remove previous playhead
  document.querySelectorAll('.step.playing').forEach(el => el.classList.remove('playing'));
  document.querySelectorAll('.dot.active').forEach(el => el.classList.remove('active'));

  document.getElementById(`dot-${currentStep}`).classList.add('active');

  let anyHit = false;
  let hitColor = null;

  TRACKS.forEach((track, t) => {
    const stepEl = document.querySelector(`.track[data-track="${t}"] .step[data-step="${currentStep}"]`);
    if (stepEl) stepEl.classList.add('playing');
    if (grid[t][currentStep]) {
      playSound(track.type, track.freq);
      anyHit = true;
      hitColor = FLASH_COLORS[t];
    }
  });

  if (anyHit) flashScreen(hitColor);

  currentStep = (currentStep + 1) % STEPS;
}

function flashScreen(color) {
  const flash = document.getElementById('flash');
  flash.style.background = color;
  flash.style.opacity = '0.06';
  setTimeout(() => { flash.style.opacity = '0'; }, 80);
}

function startStop() {
  if (playing) {
    clearInterval(intervalId);
    playing = false;
    const playBtn = document.getElementById('playBtn');
    playBtn.innerHTML = '<span class="play-icon">▶</span> PLAY';
    playBtn.classList.remove('running');
    document.querySelectorAll('.step.playing').forEach(el => el.classList.remove('playing'));
    document.querySelectorAll('.dot.active').forEach(el => el.classList.remove('active'));
    currentStep = 0;
  } else {
    ctx.resume();
    playing = true;
    const playBtn = document.getElementById('playBtn');
    playBtn.innerHTML = '<span class="play-icon">⏸</span> STOP';
    playBtn.classList.add('running');
    const ms = (60 / bpm / 4) * 1000;
    tick();
    intervalId = setInterval(tick, ms);
  }
}

function updateBpm() {
  document.getElementById('bpmVal').textContent = bpm;
  if (playing) {
    clearInterval(intervalId);
    const ms = (60 / bpm / 4) * 1000;
    intervalId = setInterval(tick, ms);
  }
}

// --- Controls ---
document.getElementById('playBtn').addEventListener('click', startStop);

document.getElementById('clearBtn').addEventListener('click', () => {
  grid = TRACKS.map(() => Array(STEPS).fill(false));
  document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
});

document.getElementById('randomBtn').addEventListener('click', () => {
  grid = TRACKS.map((_, t) => Array(STEPS).fill(false).map(() => {
    const density = t === 0 ? 0.3 : t === 1 ? 0.2 : t === 2 ? 0.5 : 0.15;
    return Math.random() < density;
  }));
  document.querySelectorAll('.step').forEach(el => {
    const t = parseInt(el.dataset.track);
    const s = parseInt(el.dataset.step);
    el.classList.toggle('active', grid[t][s]);
  });
});

document.getElementById('bpmDown').addEventListener('click', () => { bpm = Math.max(60, bpm - 5); updateBpm(); });
document.getElementById('bpmUp').addEventListener('click', () => { bpm = Math.min(200, bpm + 5); updateBpm(); });

// --- Theme Toggle ---
const themeToggle = document.getElementById('themeToggle');
const body = document.body;

// Check for saved theme preference or default to dark mode
const savedTheme = localStorage.getItem('theme') || 'dark-mode';
if (savedTheme === 'light-mode') {
  body.classList.add('light-mode');
  themeToggle.textContent = '☀️';
}

themeToggle.addEventListener('click', () => {
  body.classList.toggle('light-mode');
  const isLightMode = body.classList.contains('light-mode');
  themeToggle.textContent = isLightMode ? '☀️' : '🌙';
  localStorage.setItem('theme', isLightMode ? 'light-mode' : 'dark-mode');
});

// Keyboard: spacebar = play/stop
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); startStop(); }
});
</script>
</body>
</html>
